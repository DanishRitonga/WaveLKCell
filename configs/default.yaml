seed: 19
mode: fit

data:
  batch_size: 32
  num_workers: 16
  train_fold: 1
  val_fold: 2
  test_fold: 3
  num_classes: 6

model:
  num_nuclei_classes: 6
  num_tissue_classes: 19
  pretrained_encoder: true

optimizer:
  lr: 8e-4
  backbone_lr_ratio: 0.1
  betas: [0.85, 0.95]
  weight_decay: 0.05

scheduler:
  eta_min: 1e-5

trainer:
  epochs: 130
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  unfreeze_epoch: 25
  patience: 130
  amp: true
  magnification: 40

loss:
  nuclei_binary_map:
    focaltverskyloss:
      loss_fn: FocalTverskyLoss
      weight: 1
    dice:
      loss_fn: dice_loss
      weight: 1
  hv_map:
    mse:
      loss_fn: mse_loss_maps
      weight: 2.5
    msge:
      loss_fn: msge_loss_maps
      weight: 8
  nuclei_type_map:
    bce:
      loss_fn: xentropy_loss
      weight: 0.5
    dice:
      loss_fn: dice_loss
      weight: 0.2
    mcfocaltverskyloss:
      loss_fn: MCFocalTverskyLoss
      weight: 0.5
      args:
        num_classes: 6
  tissue_types:
    ce:
      loss_fn: CrossEntropyLoss
      weight: 0.1

experiment_name: wavellkcell
save_dir: runs/wavellkcell

dataset_config:
  tissue_types:
    Adrenal_gland: 0
    Bile-duct: 1
    Bladder: 2
    Breast: 3
    Cervix: 4
    Colon: 5
    Esophagus: 6
    HeadNeck: 7
    Kidney: 8
    Liver: 9
    Lung: 10
    Ovarian: 11
    Pancreatic: 12
    Prostate: 13
    Skin: 14
    Stomach: 15
    Testis: 16
    Thyroid: 17
    Uterus: 18
  nuclei_types:
    Background: 0
    Neoplastic: 1
    Inflammatory: 2
    Connective: 3
    Dead: 4
    Epithelial: 5
